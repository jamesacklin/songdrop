name: Songdrop
options:
  bundleIdPrefix: io.tlon
  deploymentTarget:
    iOS: "17.0"
targets:
  Songdrop:
    type: application
    platform: iOS
    sources:
      - Songdrop
    info:
      path: Songdrop/Info.plist
      properties:
        CFBundleDisplayName: Songdrop
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Allows plain-HTTP servers on your LAN/VPN. Remove if your server has TLS.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tlon.songdrop
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
