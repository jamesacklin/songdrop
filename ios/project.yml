name: Songdrop
options:
  bundleIdPrefix: com.jamesacklin
  deploymentTarget:
    iOS: "17.0"
targets:
  Songdrop:
    type: application
    platform: iOS
    sources:
      - Songdrop
    info:
      path: Songdrop/Info.plist
      properties:
        CFBundleDisplayName: Songdrop
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Allows plain-HTTP servers on your LAN/VPN. Remove if your server has TLS.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # App uses only standard HTTPS (exempt) crypto — declaring this skips the
        # export-compliance prompt on every TestFlight/App Store upload.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesacklin.songdropapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Automatic signing with your personal Apple ID team. DEVELOPMENT_TEAM
        # is filled in from the account you select in Xcode (or set it here to
        # your personal Team ID to preselect it).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4S2D335HW6
